# CodeQL configuration for Quill.
#
# The default query suite plus the security-and-quality pack gives broad
# coverage for a standard-library-only Go library without third-party noise.
name: Quill CodeQL config

queries:
  - uses: security-and-quality

# Generated Go emitted by the compile-to-Go backend and the benchmark harness
# module are excluded: the generated sources are exercised through the library
# API and the bench module pulls third-party peer engines that are not Quill's
# code to scan. The examples are standalone demonstration programs, not part of
# the importable library surface, so their illustrative literals (a sample host
# name, loopback upstreams) are not shipped-code findings worth tracking.
paths-ignore:
  - bench
  - examples
  - '**/*_gen.go'

# Result filters.
#
# go/incorrect-integer-conversion is excluded because every report it raises here
# is an int(n.Int) read of an AST child count. The parser writes that field as
# int64(len(...)) (setNode.Int and the apply/cache counts in parse/control.go),
# so the value provably fits int -- the int64 hop is a lossless round-trip on the
# 64-bit build targets. CodeQL flags them only because the same Node.Int field is
# ALSO written from strconv.ParseInt for integer literals on other node kinds,
# and its taint tracking is not field-instance sensitive. The one genuine
# narrowing this query surfaced -- tabLevels coercing a user-supplied @tab level
# -- was fixed in code with a math.MaxInt clamp, not suppressed here.
query-filters:
  - exclude:
      id: go/incorrect-integer-conversion
