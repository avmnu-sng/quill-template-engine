# CodeQL configuration for Quill.
#
# The default query suite plus the security-and-quality pack gives broad
# coverage for a standard-library-only Go library without third-party noise.
name: Quill CodeQL config

queries:
  - uses: security-and-quality

# Generated Go emitted by the compile-to-Go backend and the benchmark harness
# module are excluded: the generated sources are exercised through the library
# API and the bench module pulls third-party peer engines that are not Quill's
# code to scan.
paths-ignore:
  - bench
  - '**/*_gen.go'

# Result filters. paths-ignore does not reliably drop alerts for a compiled
# language (the analyzer reports on everything it builds), so the false positives
# below are excluded by query id, which does apply to Go.
#
# go/incorrect-integer-conversion is INTENTIONALLY NOT excluded: it is a useful
# check for real int64->int narrowings, so it stays armed. Its former reports
# were int(n.Int) reads of an AST child count that the parser writes as
# int64(len(...)); those now go through ast.Node.IntCount, whose explicit bounds
# guard both documents the len()-fits-int invariant and satisfies the query. The
# one genuine narrowing it surfaced (tabLevels, a user @tab level) was fixed with
# a math.MaxInt clamp.
#
# go/incomplete-hostname-regexp and go/regex/missing-regexp-anchor: Quill's engine
# compiles arbitrary runtime strings as regexes for the user-facing `matches`
# operator (see the regexp.Compile in interp/operators.go and compile/prelude.go),
# so CodeQL's whole-program dataflow treats every hostname-shaped string literal
# that could reach a binding as a potential regex pattern. The only current
# matches are illustrative literals (the sample nginx server_name in
# examples/braces/main.go); Quill ships no hostname or URL validation regex for
# these queries to guard. They are excluded rather than left as recurring false
# positives on demo/test data.
query-filters:
  - exclude:
      id: go/incomplete-hostname-regexp
  - exclude:
      id: go/regex/missing-regexp-anchor
