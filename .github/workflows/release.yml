name: release

# Fire on final release tags and on the pre-release shapes. GitHub Actions tag
# filters are globs, not regexes: a loose "v*.*.*" would wrongly match a
# pre-release such as v1.2.3-rc.1 as if it were final, so the pre-release shapes
# are listed explicitly and kept distinct from the final pattern.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha.[0-9]+'

# GoReleaser needs write access to create the GitHub Release and upload the
# archives + checksums. Nothing else is required: there is no registry push.
permissions:
  contents: write

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # GoReleaser derives the changelog and release notes from git history,
          # so the full history and tags must be present.
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
      - name: Validate release tag
        run: |
          set -eu
          tag="${GITHUB_REF_NAME}"
          echo "Validating pushed tag: ${tag}"

          # Extract the module's declared version from version.go.
          want="v$(sed -n 's/.*Version = "\(.*\)".*/\1/p' version.go)"
          if [ "${want}" = "v" ]; then
            echo "ERROR: could not read Version from version.go"
            exit 1
          fi

          # (a) Tagged-version check: the tag must equal "v" + the Version const.
          if [ "${tag}" != "${want}" ]; then
            echo "ERROR: tag ${tag} does not match version.go (${want})."
            echo "Bump const Version in version.go, or push the matching tag."
            exit 1
          fi

          # (b) Stable-version check: the tag must be a well-formed semver
          # vMAJOR.MINOR.PATCH, optionally followed by a -prerelease suffix.
          semver='^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'
          if ! printf '%s\n' "${tag}" | grep -Eq "${semver}"; then
            echo "ERROR: tag ${tag} is not a well-formed semver vMAJOR.MINOR.PATCH[-prerelease]."
            exit 1
          fi

          # A FINAL tag (no -prerelease suffix) requires Version to also be final.
          case "${tag}" in
            *-*)
              echo "Pre-release tag ${tag} accepted." ;;
            *)
              case "${want}" in
                *-*)
                  echo "ERROR: final tag ${tag} but version.go carries a prerelease suffix (${want})."
                  exit 1 ;;
                *)
                  echo "Final tag ${tag} accepted." ;;
              esac ;;
          esac

          echo "Tag ${tag} is consistent with version.go."

      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: '~> v2'
          args: release --clean
        env:
          # The default token is sufficient to cut the Release in this repo. No
          # additional secret is defined, and no registry credentials are used.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Poke the module proxy so pkg.go.dev fetches and indexes the new tag
      # immediately instead of waiting for the next organic request. Best-effort:
      # a proxy hiccup must not fail an otherwise successful release.
      - name: Trigger pkg.go.dev indexing
        run: |
          module="github.com/avmnu-sng/quill-template-engine"
          tag="${GITHUB_REF_NAME}"
          echo "Requesting proxy.golang.org to index ${module}@${tag}"
          curl -fsSL "https://proxy.golang.org/${module}/@v/${tag}.info" || \
            echo "Proxy request failed; pkg.go.dev will index on the next organic fetch."
