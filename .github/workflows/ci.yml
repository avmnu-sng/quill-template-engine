name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel superseded runs on a branch or PR, but let a push to main finish so a
# green commit is never reported from a partially cancelled run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }}, ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        # "1.23" pins the go.mod floor so the minimum supported Go stays green;
        # oldstable and stable track the two newest releases (covering the range
        # up to the latest). Quote the version so YAML does not read a value like
        # 1.20 as the float 1.2.
        go: [ "1.23", oldstable, stable ]
    # Force bash on every OS so the test command's arguments parse identically;
    # the Windows default shell (PowerShell) mangles the go test flag list.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      # -race surfaces data races; -shuffle=on randomizes test order to catch
      # inter-test coupling; -covermode=atomic is required alongside -race.
      # -coverpkg=./... credits cross-package exercise, so the integration and
      # conformance suites count toward the packages they drive (a per-package
      # profile would report them as uncovered).
      - name: Test
        run: go test -race -shuffle=on -covermode=atomic -coverpkg=./... -coverprofile=coverage.out ./...
      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.go == 'stable'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error
          retention-days: 7

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@d583c34f0599d37dbac4a198b9c83201be380893 # v9.3.0
        with:
          version: v2.11.4
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  coverage:
    name: coverage
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
      # Authenticated upload via the CODECOV_TOKEN secret (tokenless upload is no
      # longer reliable, even for public repos). fail_ci_if_error stays false so
      # a Codecov outage never fails the build.
      - name: Upload to Codecov
        uses: codecov/codecov-action@5975040f7f7d40edaff8d784b576fd65ae95c073 # v5.5.5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: avmnu-sng/quill-template-engine
          files: coverage.out
          fail_ci_if_error: false

  bench:
    name: bench (offline)
    runs-on: ubuntu-latest
    # The benchmark harness is a separate nested module (./bench) that the engine
    # module never imports, so its offline fairness/verification tests -- the ones
    # asserting byte-identical output across engines -- otherwise never run in CI.
    # Exercise them under the default build tag (Quill + stdlib only; the external
    # peer engines stay gated behind the `thirdparty` tag) so a broken fairness
    # check or a bench compile error is caught on the PR instead of post-merge.
    # This runs -run only (no -bench): correctness, not timings. bench/go.mod pins
    # a newer Go than the engine module's minimum, so it uses stable only.
    defaults:
      run:
        shell: bash
        working-directory: bench
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
      - name: Test (offline harness)
        run: go test ./...

  ci-done:
    name: ci-done
    # The single required status check. It aggregates every other job so branch
    # protection needs to reference only this one.
    needs: [ test, lint, coverage, bench ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All CI jobs succeeded."
