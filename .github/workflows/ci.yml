name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel superseded runs on a branch or PR, but let a push to main finish so a
# green commit is never reported from a partially cancelled run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }}, ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        go: [ stable, oldstable ]
    # Force bash on every OS so the test command's arguments parse identically;
    # the Windows default shell (PowerShell) mangles the go test flag list.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      # -race surfaces data races; -shuffle=on randomizes test order to catch
      # inter-test coupling; -covermode=atomic is required alongside -race.
      - name: Test
        run: go test -race -shuffle=on -covermode=atomic -coverprofile=coverage.out ./...
      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.go == 'stable'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error
          retention-days: 7

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  coverage:
    name: coverage
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
      # Tokenless upload: the repository is public, so Codecov accepts the report
      # without a secret. fail_ci_if_error stays false so a Codecov outage never
      # fails the build.
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          fail_ci_if_error: false

  ci-done:
    name: ci-done
    # The single required status check. It aggregates every other job so branch
    # protection needs to reference only this one.
    needs: [ test, lint, coverage ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All CI jobs succeeded."
