name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel superseded runs on a branch or PR, but let a push to main finish so a
# green commit is never reported from a partially cancelled run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # Resolve the Go versions to test: every minor from the go.mod floor through
  # the current stable release, computed at run time. This keeps the range
  # contiguous with zero maintenance -- no minor silently drops out when a new
  # Go ships (e.g. when 1.27 lands, 1.25 is still tested), and the floor tracks
  # go.mod automatically. Emits a JSON array for the test matrix and the latest
  # minor (used to pick the single coverage-uploading leg).
  go-versions:
    name: resolve Go versions
    runs-on: ubuntu-latest
    outputs:
      list: ${{ steps.compute.outputs.list }}
      latest: ${{ steps.compute.outputs.latest }}
    steps:
      - uses: actions/checkout@v7
      - id: compute
        shell: bash
        run: |
          set -euo pipefail
          floor=$(awk '/^go [0-9]/{print $2; exit}' go.mod)
          ver=$(curl -fsSL --retry 3 'https://go.dev/VERSION?m=text')
          latest=${ver%%$'\n'*}          # first line, e.g. go1.26.5
          latest=${latest#go}            # 1.26.5
          maj=${floor%%.*}               # 1
          fmin=${floor#*.}; fmin=${fmin%%.*}     # floor minor (handles 1.23 and 1.23.0)
          lmin=${latest#*.}; lmin=${lmin%%.*}    # latest minor
          if [ "$lmin" -lt "$fmin" ]; then
            echo "resolved latest ($maj.$lmin) is below the go.mod floor ($floor)" >&2
            exit 1
          fi
          list=""
          for m in $(seq "$fmin" "$lmin"); do list="$list\"$maj.$m\","; done
          {
            echo "list=[${list%,}]"
            echo "latest=$maj.$lmin"
          } >> "$GITHUB_OUTPUT"
          echo "Testing Go: [${list%,}] (floor $floor, latest $maj.$lmin)"

  test:
    name: test (${{ matrix.os }}, ${{ matrix.go }})
    needs: go-versions
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        # Every Go minor from the go.mod floor through the current stable,
        # resolved at run time by the go-versions job -- always contiguous, with
        # no manual bump when a new Go ships.
        go: ${{ fromJSON(needs.go-versions.outputs.list) }}
    # Force bash on every OS so the test command's arguments parse identically;
    # the Windows default shell (PowerShell) mangles the go test flag list.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      # -race surfaces data races; -shuffle=on randomizes test order to catch
      # inter-test coupling; -covermode=atomic is required alongside -race.
      # -coverpkg=./... credits cross-package exercise, so the integration and
      # conformance suites count toward the packages they drive (a per-package
      # profile would report them as uncovered).
      - name: Test
        run: go test -race -shuffle=on -covermode=atomic -coverpkg=./... -coverprofile=coverage.out ./...
      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.go == needs.go-versions.outputs.latest
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error
          retention-days: 7

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.11.4
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  coverage:
    name: coverage
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage
      # Authenticated upload via the CODECOV_TOKEN secret (tokenless upload is no
      # longer reliable, even for public repos). fail_ci_if_error stays false so
      # a Codecov outage never fails the build.
      - name: Upload to Codecov
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: avmnu-sng/quill-template-engine
          files: coverage.out
          fail_ci_if_error: false

  bench:
    name: bench (offline)
    runs-on: ubuntu-latest
    # The benchmark harness is a separate nested module (./bench) that the engine
    # module never imports, so its offline fairness/verification tests -- the ones
    # asserting byte-identical output across engines -- otherwise never run in CI.
    # Exercise them under the default build tag (Quill + stdlib only; the external
    # peer engines stay gated behind the `thirdparty` tag) so a broken fairness
    # check or a bench compile error is caught on the PR instead of post-merge.
    # This runs -run only (no -bench): correctness, not timings. bench/go.mod pins
    # a newer Go than the engine module's minimum, so it uses stable only.
    defaults:
      run:
        shell: bash
        working-directory: bench
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
      - name: Test (offline harness)
        run: go test ./...

  ci-done:
    name: ci-done
    # The single required status check. It aggregates every other job so branch
    # protection needs to reference only this one. go-versions is included so a
    # failed matrix resolution (which would skip test) cannot slip through, and
    # 'skipped' is treated as failure since no job here is skipped on a green run.
    needs: [ go-versions, test, lint, coverage, bench ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}" = "true" ]; then
            echo "One or more CI jobs failed, were cancelled, or were skipped."
            exit 1
          fi
          echo "All CI jobs succeeded."
