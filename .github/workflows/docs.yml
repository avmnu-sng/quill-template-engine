name: docs

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
  # Build (but do not deploy) on PRs that touch docs so a `mkdocs build --strict`
  # break surfaces on the PR instead of only after merge, when docs.yml would
  # otherwise first run on push-to-main.
  pull_request:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
  workflow_dispatch:

# On push/dispatch the deploy job runs, so serialize under one 'pages' group with
# cancel-in-progress false: an in-flight deploy finishes rather than being
# clobbered by a later push (which can leave the published site half-updated). A
# pull request only builds --strict (no deploy), so it gets its own per-ref group
# that cancels superseded runs and never contends with the deploy group.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('docs-pr-{0}', github.ref) || 'pages' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install documentation dependencies
        run: pip install -r requirements-docs.txt
      - name: Build site (strict)
        run: mkdocs build --strict
      # Publish the artifact only for a real deploy; a PR stops after the strict
      # build, which is the pre-merge check.
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: deploy
    # A pull request only validates the build; deploying is reserved for
    # push-to-main and manual dispatch.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Deploying to Pages needs pages:write to publish and id-token:write for the
    # OIDC handshake deploy-pages performs.
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
