site_name: Quill
site_description: A general-purpose, gradually-typed, fast template engine for Go.
site_url: https://avmnu-sng.github.io/quill-template-engine/
repo_url: https://github.com/avmnu-sng/quill-template-engine
repo_name: avmnu-sng/quill-template-engine
copyright: Licensed under the Apache License, Version 2.0.

docs_dir: docs
use_directory_urls: true

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
        - docs
      check_paths: true
  - tables

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/avmnu-sng/quill-template-engine

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guide:
      - Templates: guide/templates.md
      - Expressions: guide/expressions.md
      - Control Flow: guide/control-flow.md
      - Composition: guide/composition.md
  - Types: types.md
  - Whitespace Control: whitespace.md
  - Escaping & Safety: safety.md
  - Coverage: coverage.md
  - Performance: performance.md
  - Comparison: comparison.md
  - Standard Library: stdlib.md
  - Reference:
      - Language Reference: reference/language.md
      - Grammar: reference/grammar.md
  - Extensions & Loaders: extensions.md
  - CLI: cli.md
  - API: api.md
  - Internals:
      - Architecture: architecture.md
  - Contributing: contributing.md
  - Changelog: changelog.md
