# Codecov configuration for Quill.
#
# Coverage is generated with `-coverpkg=./...` (see .github/workflows/ci.yml) so
# integration and conformance tests count toward the packages they exercise.
# The paths below are excluded from the coverage report because they are not part
# of the library's tested surface: the examples are standalone demonstration
# programs, and the *_gen.go files are generated by the compile-to-Go backend and
# are exercised through the library API rather than directly.
ignore:
  - "examples/**"
  - "**/*_gen.go"

coverage:
  status:
    # Keep Codecov's checks informational so a small coverage movement never
    # blocks a merge; ci-done stays the single required gate.
    project:
      default:
        informational: true
    patch:
      default:
        informational: true
